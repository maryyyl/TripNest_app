version: '3.8'

services:
  db:
    image: postgres:16
    container_name: tripnest_db
    restart: always
    environment:
      POSTGRES_USER: tripnest
      POSTGRES_PASSWORD: tripnest123
      POSTGRES_DB: tripnest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
